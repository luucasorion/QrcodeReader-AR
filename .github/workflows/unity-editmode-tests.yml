name: Unity EditMode Tests

# Runs the off-device EditMode test suite (classifier + content-resolver guards, etc.)
# on every PR into dev/main. PlayMode and on-device behaviour are intentionally out of
# scope here — see docs/adr/0004-ci-runs-editmode-tests-via-gameci.md.

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: editmode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  editmode:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Cache the imported Library to keep cold-start import time down.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-editmode-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            Library-editmode-
            Library-

      # game-ci auto-detects the editor version from ProjectSettings/ProjectVersion.txt.
      # Unity activation credentials come from repo secrets (see ADR 0004); never commit them.
      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: editmode
          artifactsPath: editmode-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode test results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EditMode test results
          path: editmode-artifacts
